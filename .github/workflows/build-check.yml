name: build-check

# Verifies dist/standalone.js is regenerated from src/. No secrets used.
on:
  pull_request:
    paths:
      - "src/**"
      - "build.js"
      - "dist/**"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dist-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Rebuild dist
        run: node build.js
      - name: Fail if dist/ is stale
        run: |
          git diff --exit-code dist/ || {
            echo "::error::dist/ is out of date. Run 'node build.js' and commit the result.";
            exit 1;
          }
