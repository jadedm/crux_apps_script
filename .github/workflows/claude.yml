name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Required — reusable workflows can only restrict, not elevate, permissions.
permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    uses: jadedm/claude-review-action/.github/workflows/claude-review.yml@v1.2.0
    with:
      stack: apps-script
      # Load prompts from the same immutable release the workflow is pinned to.
      ref: v1.2.0
      runner: '"ubuntu-latest"'
      slack_notify: false
      extra_prompt_path: .github/review-extras.md
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
