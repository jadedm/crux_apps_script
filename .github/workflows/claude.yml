name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# Required — reusable workflows can only restrict, not elevate, permissions.
permissions:
  actions: read
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    uses: jadedm/claude-review-action/.github/workflows/claude-review.yml@v1
    with:
      # No apps-script stack prompt in the central repo yet; base.md + the
      # repo-specific notes below cover it. Promote to a dedicated stack later.
      stack: base
      runner: '"ubuntu-latest"'
      slack_notify: false
      extra_prompt_path: .github/review-extras.md
    secrets:
      claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
